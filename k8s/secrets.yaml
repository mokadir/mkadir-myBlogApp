apiVersion: v1
kind: Secret
metadata:
  namespace: ns-blogapp
  name: blogapp-secrets
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  nextauth-secret: "your-nextauth-secret-change-this"
  # Database URL for PostgreSQL
  database-url: "postgresql://postgres:password@postgres-service:5432/modernblog?schema=public"
  # Cloudinary
  cloudinary-api-key: "your-api-key"
  cloudinary-api-secret: "your-api-secret"
  # SMTP
  smtp-user: "your-email@gmail.com"
  smtp-pass: "your-app-password"
  # Cron
  cron-secret: "your-cron-secret-change-this"
